on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests beautifulsoup4

      - name: Run Preston Scraper
        run: python scraper.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This uploads the whole folder, including your new index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


      - name: Save to GitHub
        run: |
          git config --global user.name "PrestonFuelBot"
          git config --global user.email "bot@example.com"
          git add index.html
          git commit -m "Update prices for $(date)" || echo "No changes"
          git push
