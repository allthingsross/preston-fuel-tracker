 name: Update Fuel Prices

on:
  schedule:
    - cron: '27 22 * * *'  # This is Line 5: 7:00 AM daily
  workflow_dispatch:     # This allows you to click a button to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # This is vital in 2026 to allow GitHub to save the file
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "FuelBot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Updated Preston prices for $(date)" || echo "No changes to commit"
          git push
